<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f3460"/></linearGradient>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e2b714"/><stop offset="100%" stop-color="#f5d742"/></linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2ecc71"/><stop offset="100%" stop-color="#27ae60"/></linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3498db"/><stop offset="100%" stop-color="#2980b9"/></linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9b59b6"/><stop offset="100%" stop-color="#8e44ad"/></linearGradient>
    <linearGradient id="c5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="20"/>
  <text x="300" y="35" text-anchor="middle" fill="#e2b714" font-size="20" font-weight="bold" font-family="Microsoft YaHei,sans-serif">定制收纳系统设计流程</text>
  <text x="300" y="55" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="12" font-family="Microsoft YaHei,sans-serif">Data-Driven Custom Storage Design Process</text>

  <!-- Flow -->
  <g transform="translate(40, 80)">
    <!-- Step 1: Data Collection -->
    <rect x="0" y="0" width="120" height="90" rx="12" fill="rgba(226,183,20,.12)" stroke="#e2b714" stroke-width="1.5"/>
    <text x="60" y="28" text-anchor="middle" fill="#e2b714" font-size="11" font-weight="bold" font-family="Microsoft YaHei,sans-serif">STEP 1</text>
    <text x="60" y="48" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Microsoft YaHei,sans-serif">📋 数据采集</text>
    <text x="60" y="66" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">体态参数</text>
    <text x="60" y="80" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">生活习惯</text>

    <line x1="120" y1="45" x2="155" y2="45" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="155,45 148,40 148,50" fill="rgba(255,255,255,.3)"/>

    <!-- Step 2: Analysis -->
    <rect x="160" y="0" width="120" height="90" rx="12" fill="rgba(46,204,113,.12)" stroke="#2ecc71" stroke-width="1.5"/>
    <text x="220" y="28" text-anchor="middle" fill="#2ecc71" font-size="11" font-weight="bold" font-family="Microsoft YaHei,sans-serif">STEP 2</text>
    <text x="220" y="48" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Microsoft YaHei,sans-serif">📊 数据分析</text>
    <text x="220" y="66" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">痛点诊断</text>
    <text x="220" y="80" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">频率矩阵</text>

    <line x1="280" y1="45" x2="315" y2="45" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="315,45 308,40 308,50" fill="rgba(255,255,255,.3)"/>

    <!-- Step 3: Design -->
    <rect x="320" y="0" width="120" height="90" rx="12" fill="rgba(52,152,219,.12)" stroke="#3498db" stroke-width="1.5"/>
    <text x="380" y="28" text-anchor="middle" fill="#3498db" font-size="11" font-weight="bold" font-family="Microsoft YaHei,sans-serif">STEP 3</text>
    <text x="380" y="48" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Microsoft YaHei,sans-serif">📐 方案设计</text>
    <text x="380" y="66" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">空间布局</text>
    <text x="380" y="80" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">柜体定制</text>

    <line x1="440" y1="45" x2="475" y2="45" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="475,45 468,40 468,50" fill="rgba(255,255,255,.3)"/>

    <!-- Step 4: Install -->
    <rect x="0" y="130" width="120" height="90" rx="12" fill="rgba(155,89,182,.12)" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="60" y="158" text-anchor="middle" fill="#9b59b6" font-size="11" font-weight="bold" font-family="Microsoft YaHei,sans-serif">STEP 4</text>
    <text x="60" y="178" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Microsoft YaHei,sans-serif">🔧 安装落地</text>
    <text x="60" y="196" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">现场安装</text>
    <text x="60" y="210" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">验收调整</text>

    <line x1="120" y1="175" x2="155" y2="175" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="155,175 148,170 148,180" fill="rgba(255,255,255,.3)"/>

    <!-- Step 5: Follow-up -->
    <rect x="160" y="130" width="120" height="90" rx="12" fill="rgba(231,76,60,.12)" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="220" y="158" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold" font-family="Microsoft YaHei,sans-serif">STEP 5</text>
    <text x="220" y="178" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="Microsoft YaHei,sans-serif">🔄 持续优化</text>
    <text x="220" y="196" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">使用反馈</text>
    <text x="220" y="210" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">习惯适应</text>

    <!-- Feedback loop arrow -->
    <path d="M280 175 Q300 130 280 90" fill="none" stroke="rgba(226,183,20,.4)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="278,90 285,96 275,98" fill="rgba(226,183,20,.4)"/>
    <text x="295" y="130" fill="rgba(226,183,20,.4)" font-size="9" font-family="Microsoft YaHei,sans-serif">反馈迭代</text>
  </g>

  <!-- Data-driven highlight -->
  <g transform="translate(40, 250)">
    <rect x="0" y="0" width="520" height="95" rx="10" fill="rgba(226,183,20,.06)" stroke="rgba(226,183,20,.2)" stroke-width="1"/>
    <text x="20" y="22" fill="#e2b714" font-size="12" font-weight="bold" font-family="Microsoft YaHei,sans-serif">🔬 数据驱动设计 (Data-Driven Design)</text>

    <text x="20" y="46" fill="rgba(255,255,255,.6)" font-size="11" font-family="Microsoft YaHei,sans-serif"><tspan fill="#e2b714">体态参数(身高/臂长)</tspan> → 黄金区高度、挂杆位置、层板进深</text>
    <text x="20" y="64" fill="rgba(255,255,255,.6)" font-size="11" font-family="Microsoft YaHei,sans-serif"><tspan fill="#e2b714">使用频率(每日/每周/低频)</tspan> → 物品存放区域优先级</text>
    <text x="20" y="82" fill="rgba(255,255,255,.6)" font-size="11" font-family="Microsoft YaHei,sans-serif"><tspan fill="#e2b714">动线轨迹(清晨/晚间/周末)</tspan> → 物品就近存放，减少无效移动</text>
  </g>

  <!-- Footer -->
  <text x="300" y="385" text-anchor="middle" fill="rgba(255,255,255,.25)" font-size="10" font-family="Microsoft YaHei,sans-serif">科学收纳 = 人体工学 × 行为数据 × 空间效率 × 美学设计</text>
</svg>
