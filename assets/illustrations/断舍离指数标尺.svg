<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f3460"/></linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e67e22"/><stop offset="100%" stop-color="#d35400"/></linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f1c40f"/><stop offset="100%" stop-color="#f39c12"/></linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2ecc71"/><stop offset="100%" stop-color="#27ae60"/></linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg)" rx="20"/>
  <text x="300" y="35" text-anchor="middle" fill="#e2b714" font-size="20" font-weight="bold" font-family="Microsoft YaHei,sans-serif">断舍离指数标尺</text>
  <text x="300" y="55" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="12" font-family="Microsoft YaHei,sans-serif">Declutter Index Scale — 客户类型诊断与策略匹配</text>

  <!-- Scale bar -->
  <g transform="translate(50, 85)">
    <!-- Scale background -->
    <rect x="0" y="0" width="500" height="24" rx="12" fill="rgba(255,255,255,.1)"/>

    <!-- Segments -->
    <rect x="0" y="0" width="100" height="24" rx="12" fill="url(#bar1)" opacity=".8"/>
    <rect x="96" y="0" width="130" height="24" fill="url(#bar2)" opacity=".75"/>
    <rect x="222" y="0" width="140" height="24" fill="url(#bar3)" opacity=".7"/>
    <rect x="358" y="0" width="142" height="24" rx="12" fill="url(#bar4)" opacity=".7"/>

    <!-- Scale labels -->
    <text x="50" y="46" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold" font-family="Microsoft YaHei,sans-serif">重度保留型</text>
    <text x="50" y="62" text-anchor="middle" fill="rgba(231,76,60,.6)" font-size="10" font-family="Microsoft YaHei,sans-serif">0 - 25分</text>

    <text x="160" y="46" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold" font-family="Microsoft YaHei,sans-serif">适度保留型</text>
    <text x="160" y="62" text-anchor="middle" fill="rgba(230,126,34,.6)" font-size="10" font-family="Microsoft YaHei,sans-serif">26 - 40分</text>

    <text x="290" y="46" text-anchor="middle" fill="#f1c40f" font-size="12" font-weight="bold" font-family="Microsoft YaHei,sans-serif">倾向精简型</text>
    <text x="290" y="62" text-anchor="middle" fill="rgba(241,196,15,.6)" font-size="10" font-family="Microsoft YaHei,sans-serif">41 - 55分</text>

    <text x="430" y="46" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold" font-family="Microsoft YaHei,sans-serif">极简主义者</text>
    <text x="430" y="62" text-anchor="middle" fill="rgba(46,204,113,.6)" font-size="10" font-family="Microsoft YaHei,sans-serif">56 - 65分</text>

    <!-- Score indicators -->
    <line x1="100" y1="-4" x2="100" y2="28" stroke="rgba(255,255,255,.3)" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="225" y1="-4" x2="225" y2="28" stroke="rgba(255,255,255,.3)" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="360" y1="-4" x2="360" y2="28" stroke="rgba(255,255,255,.3)" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Strategy Cards -->
  <g transform="translate(30, 170)">
    <text x="0" y="0" fill="rgba(255,255,255,.6)" font-size="12" font-family="Microsoft YaHei,sans-serif">对应设计策略：</text>

    <!-- Card 1 -->
    <rect x="0" y="15" width="130" height="80" rx="8" fill="rgba(231,76,60,.1)" stroke="rgba(231,76,60,.3)" stroke-width="1"/>
    <text x="65" y="33" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold" font-family="Microsoft YaHei,sans-serif">重度保留型</text>
    <text x="65" y="52" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">增加储物容量</text>
    <text x="65" y="67" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">封闭式收纳为主</text>
    <text x="65" y="82" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">少做开放式展架</text>

    <!-- Card 2 -->
    <rect x="140" y="15" width="130" height="80" rx="8" fill="rgba(230,126,34,.1)" stroke="rgba(230,126,34,.3)" stroke-width="1"/>
    <text x="205" y="33" text-anchor="middle" fill="#e67e22" font-size="11" font-weight="bold" font-family="Microsoft YaHei,sans-serif">适度保留型</text>
    <text x="205" y="52" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">封闭+开放结合</text>
    <text x="205" y="67" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">预留20%弹性空间</text>
    <text x="205" y="82" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">分批筛选物品</text>

    <!-- Card 3 -->
    <rect x="280" y="15" width="130" height="80" rx="8" fill="rgba(241,196,15,.1)" stroke="rgba(241,196,15,.3)" stroke-width="1"/>
    <text x="345" y="33" text-anchor="middle" fill="#f1c40f" font-size="11" font-weight="bold" font-family="Microsoft YaHei,sans-serif">倾向精简型</text>
    <text x="345" y="52" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">展示性收纳优先</text>
    <text x="345" y="67" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">精细化分区</text>
    <text x="345" y="82" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">高品质收纳配件</text>

    <!-- Card 4 -->
    <rect x="420" y="15" width="130" height="80" rx="8" fill="rgba(46,204,113,.1)" stroke="rgba(46,204,113,.3)" stroke-width="1"/>
    <text x="485" y="33" text-anchor="middle" fill="#2ecc71" font-size="11" font-weight="bold" font-family="Microsoft YaHei,sans-serif">极简主义者</text>
    <text x="485" y="52" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">极致简洁设计</text>
    <text x="485" y="67" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">强调美学留白</text>
    <text x="485" y="82" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="9" font-family="Microsoft YaHei,sans-serif">低密度收纳方案</text>
  </g>

  <!-- Evaluation questions list -->
  <g transform="translate(30, 275)">
    <text x="0" y="0" fill="rgba(255,255,255,.5)" font-size="10" font-family="Microsoft YaHei,sans-serif">8题物品保留倾向 + 5题购买习惯评估 → 满分65分</text>
    <text x="0" y="20" fill="rgba(255,255,255,.3)" font-size="9" font-family="Microsoft YaHei,sans-serif">评估维度：闲置处理 | 礼物态度 | 过期品处置 | 旧衣处理 | 包装保留 | "备用"心态 | 票据处理 | 纪念品保留 | 购买前思考 | 冲动消费 | 囤积习惯 | 搭配意识 | 网购频率</text>
  </g>
</svg>
